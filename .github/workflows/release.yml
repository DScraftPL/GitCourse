name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build binary
        run: |
          gcc -Wall -Wextra -O2 main.c -o main
          chmod +x main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main
